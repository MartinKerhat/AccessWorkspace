name: Release images

# Builds the backend + frontend container images and publishes them to GHCR
# (public). Insio's ACR (acrinsio) caches these via cache rules, and
# argocd-image-updater watches GHCR for new tags. Every run produces a NEW,
# monotonically increasing tag: <VERSION>-build.<run_number> (e.g. 0.1.0-build.42)
# so image-updater's newest-build strategy always has a fresh, ordered version.
#
# Bump the base semver by editing the VERSION file at the repo root.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/docker/**"
      - "VERSION"
      - ".github/workflows/release-images.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: deploy/docker/backend.Dockerfile
          - name: frontend
            dockerfile: deploy/docker/frontend.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Compute version + image name
        id: meta
        run: |
          base="$(tr -d '[:space:]' < VERSION)"
          tag="${base}-build.${{ github.run_number }}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR requires lowercase owner
          image="${REGISTRY}/${owner}/access-workspace-${{ matrix.name }}"
          echo "tag=${tag}"     >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Building ${image}:${tag}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          # Frontend is built same-origin so one image serves every environment;
          # the arg is ignored by the backend build.
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          # Single-manifest image (no attestation index) — simplest for ACR cache.
          provenance: false
