# docker-compose (local dev) ONLY — mounted over the baked nginx.conf by the
# frontend service in docker-compose.yml. Never used by CI images.
#
# Identical to nginx.conf except connect-src additionally allows the local
# backend origin: in compose the page runs on localhost:4173 while the API is
# published on localhost:8080, so 'self' alone blocks every API call and the
# login fails with "Failed to fetch". In production the API is same-origin
# behind the ingress, so the shipped nginx.conf stays strict.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' http://127.0.0.1:47654 http://localhost:47654 http://127.0.0.1:8080 http://localhost:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location /downloads/ {
        alias /srv/downloads/;
        autoindex off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
