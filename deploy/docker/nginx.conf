server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. CSP is the primary XSS mitigation for the SPA — the
    # session token lives in the page, so script injection must be contained.
    # The build loads only same-origin hashed assets and calls the same-origin
    # API, so 'self' suffices; 'unsafe-inline' is allowed for styles only
    # (React/Vite inject inline style attributes), never for scripts.
    # connect-src also allows the desktop launcher's LOCAL endpoint
    # (127.0.0.1:47654, see backend/internal/launcherinfo) — the page probes it
    # to detect and hand off connections; without it "Launcher not detected"
    # sticks even when it is installed. Keep this in sync with launcherinfo.
    # For docker-compose dev, where the API runs on a separate origin
    # (localhost:8080), this file is overridden by nginx.dev.conf via a
    # volume mount — do NOT add dev-only origins here; this CSP ships to
    # production.
    # NOTE: verify in-browser after any frontend build change — a too-strict
    # CSP surfaces as a blank page with console violations.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' http://127.0.0.1:47654 http://localhost:47654; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # HSTS: only meaningful over HTTPS; harmless over the internal :80 hop
    # behind the TLS-terminating ingress. Two years, include subdomains.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Downloadable artifacts (launcher, browser extensions) served from a
    # mounted volume rather than baked into the image. Absent when the
    # deployment sources artifacts from Azure Blob instead.
    location /downloads/ {
        alias /srv/downloads/;
        autoindex off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
