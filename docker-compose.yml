# Local development stack. Values are read from a local .env file (see
# .env.example). Required secrets use ${VAR:?...} so `docker compose up` fails
# fast with a clear message when they are missing. In real deployments these
# variables are injected by the platform (e.g. Kubernetes ConfigMap/Secret)
# rather than a .env file.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: access_workspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d access_workspace"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/access_workspace?sslmode=disable
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4173}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      RESET_DB_ON_START: ${RESET_DB_ON_START:-false}
      # Seed demo data on startup so local dev has a login out of the box.
      SEED_ON_START: ${SEED_ON_START:-true}
      AUTH_MODE: ${AUTH_MODE:-dev}
      DEFAULT_DEV_USER: ${DEFAULT_DEV_USER:-alice}
      RESOURCE_SECRET_KEY: ${RESOURCE_SECRET_KEY:?RESOURCE_SECRET_KEY must be set in .env}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_AUTHORITY: ${ENTRA_AUTHORITY:-https://login.microsoftonline.com}
      ENTRA_REDIRECT_URI: ${ENTRA_REDIRECT_URI:-http://localhost:8080/api/auth/microsoft/callback}
      ENTRA_GROUP_SOURCE: ${ENTRA_GROUP_SOURCE:-graph}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_DIRECT_RIGHTS_JSON: ${ENTRA_DIRECT_RIGHTS_JSON:-}
      CHROME_WEB_STORE_URL: ${CHROME_WEB_STORE_URL:-}
      FIREFOX_EXTENSION_URL: ${FIREFOX_EXTENSION_URL:-}
      # Local dev serves artifacts from the mounted ./artifacts folder.
      ARTIFACTS_SOURCE: ${ARTIFACTS_SOURCE:-local}
      ARTIFACTS_DIR: /data/downloads
    volumes:
      - ./artifacts:/data/downloads:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    # The frontend nginx serves /downloads/ from the same mounted artifacts.
    volumes:
      - ./artifacts:/srv/downloads:ro
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  postgres-data:
